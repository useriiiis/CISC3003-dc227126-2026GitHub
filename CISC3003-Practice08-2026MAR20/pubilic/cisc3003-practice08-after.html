<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>CISC3003 Practice 08</title>
  <link href="http://fonts.googleapis.com/css?family=Merriweather" rel="stylesheet" type="text/css">
  <link href="http://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet" type="text/css">
  <link rel="stylesheet" href="css/styles.css">

  <!-- jQuery for event handling -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="tiled">
  <header>
    <h1>Art Filters</h1>
  </header>

  <main>
    <div id="sliderBox">
      <form>
        <p><label>Opacity: </label>
          <input type="range" id="sliderOpacity" min="0" max="100" value="100" class="sliders">
          <span id="numOpacity">100</span>%
        </p>

        <p><label>Saturation: </label>
          <input type="range" id="sliderSaturation" min="1" max="300" value="100" class="sliders">
          <span id="numSaturation">100</span>%
        </p>

        <p><label>Brightness: </label>
          <input type="range" id="sliderBrightness" min="0" max="300" value="100" class="sliders">
          <span id="numBrightness">100</span>%
        </p>

        <p><label>Hue Rotate: </label>
          <input type="range" id="sliderHue" min="0" max="360" value="0" class="sliders">
          <span id="numHue">0</span>deg
        </p>

        <p><label>Grayscale: </label>
          <input type="range" id="sliderGray" min="0" max="100" value="0" class="sliders">
          <span id="numGray">0</span>%
        </p>

        <p><label>Blur: </label>
          <input type="range" id="sliderBlur" min="0" max="10" value="0" class="sliders">
          <span id="numBlur">0</span>px
        </p>

        <p><button type="button" id="resetFilters">Reset</button></p>
      </form>
    </div>

    <figure id="imgManipulated">
      <img src="images/medium/painting1.jpg" alt="">
      <figcaption>
        <em>Still Life with Flowers in a Glass Vase</em><br>
        Jan Davidsz. de Heem, 1650 - 1683
      </figcaption>
    </figure>

    <div id="thumbBox">
      <div><img src="images/small/painting1.jpg" alt="Still Life with Flowers in a Glass Vase" title="Jan Davidsz. de Heem, 1650 - 1683"></div>
      <div><img src="images/small/painting2.jpg" alt="Portrait of Alida Christina Assink" title="Jan Adam Kruseman, 1833"></div>
      <div><img src="images/small/painting3.jpg" alt="Self-portrait" title="Vincent van Gogh, 1887"></div>
      <div><img src="images/small/painting4.jpg" alt="William II, Prince of Orange, and his Bride, Mary Stuart" title="Anthony van Dyck, 1641"></div>
      <div><img src="images/small/painting5.jpg" alt="Milkmaid" title="Johannes Vermeer, c. 1660"></div>
    </div>
  </main>

  <script>
    $(document).ready(function () {
      var $mainImage = $("#imgManipulated img");
      var $caption = $("#imgManipulated figcaption");
      var initialMainSrc = $mainImage.attr("src");
      var initialCaptionHtml = $caption.html();

      function applyFilters() {
        var opacity = $("#sliderOpacity").val();
        var saturation = $("#sliderSaturation").val();
        var brightness = $("#sliderBrightness").val();
        var hue = $("#sliderHue").val();
        var gray = $("#sliderGray").val();
        var blur = $("#sliderBlur").val();

        var filterValue =
          "opacity(" + opacity + "%) " +
          "saturate(" + saturation + "%) " +
          "brightness(" + brightness + "%) " +
          "hue-rotate(" + hue + "deg) " +
          "grayscale(" + gray + "%) " +
          "blur(" + blur + "px)";

        $mainImage.css("filter", filterValue);
        $mainImage.css("-webkit-filter", filterValue);
      }

      function syncSliderText($slider, $num) {
        $num.text($slider.val());
      }

      $("#sliderOpacity").on("input", function () {
        syncSliderText($(this), $("#numOpacity"));
        applyFilters();
      });
      $("#sliderSaturation").on("input", function () {
        syncSliderText($(this), $("#numSaturation"));
        applyFilters();
      });
      $("#sliderBrightness").on("input", function () {
        syncSliderText($(this), $("#numBrightness"));
        applyFilters();
      });
      $("#sliderHue").on("input", function () {
        syncSliderText($(this), $("#numHue"));
        applyFilters();
      });
      $("#sliderGray").on("input", function () {
        syncSliderText($(this), $("#numGray"));
        applyFilters();
      });
      $("#sliderBlur").on("input", function () {
        syncSliderText($(this), $("#numBlur"));
        applyFilters();
      });

      $("#resetFilters").on("click", function (e) {
        e.preventDefault();

        $("#sliderOpacity").val(100);
        $("#sliderSaturation").val(100);
        $("#sliderBrightness").val(100);
        $("#sliderHue").val(0);
        $("#sliderGray").val(0);
        $("#sliderBlur").val(0);

        $("#numOpacity").text("100");
        $("#numSaturation").text("100");
        $("#numBrightness").text("100");
        $("#numHue").text("0");
        $("#numGray").text("0");
        $("#numBlur").text("0");

        // Reset the image + caption back to the original selection.
        $mainImage.attr("src", initialMainSrc);
        $caption.html(initialCaptionHtml);

        // Remove filters from the image.
        $mainImage.css("filter", "none");
        $mainImage.css("-webkit-filter", "none");
      });

      // Thumbnail click swaps the main image and updates caption using alt/title.
      $("#thumbBox img").on("click", function () {
        var smallSrc = $(this).attr("src") || "";
        var largeSrc = smallSrc.replace(/\/small\//, "/medium/");

        $mainImage.attr("src", largeSrc);

        var altText = $(this).attr("alt") || "";
        var titleText = $(this).attr("title") || "";

        $caption.empty();
        $caption.append($("<em>").text(altText));
        $caption.append("<br>");
        $caption.append(document.createTextNode(titleText));
      });

      // Apply initial filter state based on the default slider values.
      applyFilters();
    });
  </script>
</body>
</html>
